<!DOCTYPE html>
<html>
<head>
<title>Nepal Gallery</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

padding:30px;
}

img{
width:100%;

}

</style>

</head>

<body>

<h1>Nepal Image Gallery</h1>

<div class="gallery">

<img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Mount_Everest_as_seen_from_Drukair2_PLW_edit.jpg">

<img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Pokhara_Lake.jpg">

<img src="https://upload.wikimedia.org/wikipedia/commons/6/60/Kathmandu_Durbar_Square.jpg">

<img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Chitwan_Rhino.jpg">

</div>

</body>
</html>
