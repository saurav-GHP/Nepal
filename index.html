<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nepal Encyclopedia</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#f6f6f6;
}

header{
background:#202122;
color:white;
padding:12px 20px;
font-size:22px;
display:flex;
justify-content:space-between;
align-items:center;
}

#search{
padding:6px;
font-size:14px;
width:200px;
}

.container{
display:flex;
}

.sidebar{
width:220px;
background:#ffffff;
border-right:1px solid #ccc;
padding:15px;
height:100vh;
position:sticky;
top:0;
overflow:auto;
}

.sidebar a{
display:block;
padding:6px;
text-decoration:none;
color:#0645ad;
}

.sidebar a:hover{
background:#f0f0f0;
}

.content{
flex:1;
padding:25px;
background:white;
max-width:1000px;
}

h1,h2{
border-bottom:1px solid #ccc;
padding-bottom:4px;
}

.toc{
background:#f8f9fa;
border:1px solid #ccc;
padding:10px;
margin:20px 0;
}

img{
max-width:100%;
margin:15px 0;
}

</style>

<script>

function searchPage(){
let input=document.getElementById("search").value.toLowerCase();
let text=document.body.innerText.toLowerCase();

if(text.includes(input)){
alert("Word found on page");
}else{
alert("No match found");
}
}

</script>

</head>

<body>

<header>
<div>Nepal Encyclopedia</div>
<input id="search" placeholder="Search..." onkeyup="searchPage()">
</header>

<div class="container">

<div class="sidebar">

<b>Navigation</b>

<a href="#overview">Overview</a>
<a href="#history">History</a>
<a href="#geography">Geography</a>
<a href="#culture">Culture</a>
<a href="#economy">Economy</a>
<a href="#tourism">Tourism</a>
<a href="#wildlife">Wildlife</a>
<a href="#education">Education</a>

</div>

<div class="content">

<h1>Nepal</h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/9/9b/Mount_Everest_as_seen_from_Drukair2_PLW_edit.jpg">

<div class="toc">

<b>Contents</b>

<ul>
<li>Overview</li>
<li>History</li>
<li>Geography</li>
<li>Culture</li>
<li>Economy</li>
<li>Tourism</li>
<li>Wildlife</li>
<li>Education</li>
</ul>

</div>

<h2 id="overview">Overview</h2>

<div id="overviewText"></div>

<h2 id="history">History</h2>

<div id="historyText"></div>

<h2 id="geography">Geography</h2>

<div id="geoText"></div>

<h2 id="culture">Culture</h2>

<div id="cultureText"></div>

<h2 id="economy">Economy</h2>

<div id="ecoText"></div>

<h2 id="tourism">Tourism</h2>

<img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Pokhara_valley.jpg">

<div id="tourText"></div>

<h2 id="wildlife">Wildlife</h2>

<div id="wildText"></div>

<h2 id="education">Education</h2>

<div id="eduText"></div>

</div>

</div>

<script>

function generateText(topic,element){

let sentence = topic + " Nepal is known for its rich history, diverse geography, cultural traditions, and the Himalayan mountain range including Mount Everest. The country has many ethnic communities, languages, and traditions that have developed over centuries.";

let text="";

for(let i=0;i<500;i++){
text += "<p>"+sentence+"</p>";
}

document.getElementById(element).innerHTML=text;

}

generateText("Overview:", "overviewText");
generateText("History:", "historyText");
generateText("Geography:", "geoText");
generateText("Culture:", "cultureText");
generateText("Economy:", "ecoText");
generateText("Tourism:", "tourText");
generateText("Wildlife:", "wildText");
generateText("Education:", "eduText");

</script>

</body>
</html>
